backend:
  name: git-gateway
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

locale: "es"

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Artículo"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha de publicación", name: "date", widget: "datetime"}
      - {label: "Resumen corto", name: "excerpt", widget: "text", hint: "2-3 oraciones. Aparece en la lista del blog."}
      - {label: "Imagen de portada", name: "image", widget: "image", required: false}
      - {label: "Servicio relacionado", name: "category", widget: "select", options: ["Microblading", "Scalp Micropigmentation", "Faciales", "Cuidado de la piel", "General"]}
      - {label: "Contenido", name: "body", widget: "markdown"}
