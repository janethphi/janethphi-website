backend:
  name: git-gateway
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

locale: "es"

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Artículo"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Resumen", name: "excerpt", widget: "text"}
      - {label: "Categoría", name: "category", widget: "select", options: ["Microblading","Scalp Micropigmentation","Faciales","General"]}
      - {label: "Contenido", name: "body", widget: "markdown"}
