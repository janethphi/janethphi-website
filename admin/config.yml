backend:
  name: git-gateway
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

locale: "es"

collections:
  - name: "blog"
    label: "Blog"
    files:
      - label: "Artículos del Blog"
        name: "posts"
        file: "posts.json"
        fields:
          - label: "Artículos"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Fecha", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
              - {label: "Resumen", name: "excerpt", widget: "text"}
              - {label: "Categoría", name: "category", widget: "select", options: ["Microblading", "Scalp Micropigmentation", "Faciales", "General"]}
