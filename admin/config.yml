backend:
  name: git-gateway
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

locale: "es"

collections:
  - name: "blog"
    label: "Blog"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Resumen (aparece en la tarjeta del blog)", name: "excerpt", widget: "text"}
      - {label: "Categoría", name: "category", widget: "select", options: ["Microblading", "Scalp Micropigmentation", "Faciales", "General"]}
      - {label: "Contenido del artículo", name: "body", widget: "markdown"}
